---
name: Build local test image
description: Sets up Docker Buildx and builds the local ccs-build test Docker image

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build local Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        load: true
        tags: ccs-build:test
        target: install-specific-cgt
        build-args: |
          MSP430_CGT_VERSION=21.6.0.LTS
          MSP430_CGT_INSTALLER_URL=21.6.0.LTS/ti_cgt_msp430_21.6.0.LTS_linux-x64_installer.bin
