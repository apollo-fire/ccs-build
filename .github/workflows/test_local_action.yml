---
name: Test local ccs_build action

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:
  merge_group:

permissions: {}

jobs:
  test_ccs_build:
    runs-on: ubuntu-latest
    name: Test CCS Build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build local test image
        uses: ./.github/actions/build-local-test-image

      - name: Run CCS build in Docker - Release
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/working_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Release

      - name: Run CCS build in Docker - Debug
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/working_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Debug

      - name: Upload firmware artifacts
        uses: ./.github/actions/upload-firmware

  test_ccs_build_failure:
    runs-on: ubuntu-latest
    name: Test CCS Build Failure
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build local test image
        uses: ./.github/actions/build-local-test-image

      - name: CCS Build action step - should fail
        id: build_step
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/failing_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Debug

      - name: Verify build failed
        if: steps.build_step.outcome == 'success'
        run: |
          echo "Error: Build was expected to fail but it succeeded"
          exit 1
