---
# jscpd:ignore-start
# #105 created to address duplication across workflows

name: Test local ccs_build action

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:
  merge_group:

permissions: {}

jobs:
  test_ccs_build:
    runs-on: ubuntu-latest
    name: Test CCS Build
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build local Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: ccs-build:test
          target: install-specific-cgt
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MSP430_CGT_VERSION=21.6.0.LTS
            MSP430_CGT_INSTALLER_URL=21.6.0.LTS/ti_cgt_msp430_21.6.0.LTS_linux-x64_installer.bin

      - name: Run CCS build in Docker - Release
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/working_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Release

      - name: Run CCS build in Docker - Debug
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/working_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Debug

      - name: Upload release firmware artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "Firmware artifact - Release"
          path: test/working_ccs_project/Release/msp430_test_project.txt
          if-no-files-found: error
          compression-level: 9

      - name: Upload debug firmware artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "Firmware artifact - Debug"
          path: test/working_ccs_project/Debug/msp430_test_project.txt
          if-no-files-found: error
          compression-level: 9

  test_ccs_build_failure:
    runs-on: ubuntu-latest
    name: Test CCS Build Failure
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build local Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: ccs-build:test
          target: install-specific-cgt
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MSP430_CGT_VERSION=21.6.0.LTS
            MSP430_CGT_INSTALLER_URL=21.6.0.LTS/ti_cgt_msp430_21.6.0.LTS_linux-x64_installer.bin

      - name: CCS Build action step - should fail
        id: build_step
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test/failing_ccs_project:/project" \
            ccs-build:test \
            /project msp430_test_project Debug

      - name: Verify build failed
        if: steps.build_step.outcome == 'success'
        run: |
          echo "Error: Build was expected to fail but it succeeded"
          exit 1

# jscpd:ignore-end
